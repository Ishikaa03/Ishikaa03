<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="footer">
  <defs>
    <linearGradient id="skyf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FB6E2E"/>
      <stop offset="30%" stop-color="#FF885C"/>
      <stop offset="62%" stop-color="#FF82A6"/>
      <stop offset="100%" stop-color="#FFAACD"/>
    </linearGradient>
    <filter id="softf" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="grainf">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="1200" height="120" fill="url(#skyf)"/>
  <g filter="url(#softf)">
    <ellipse cx="250" cy="40"  rx="220" ry="34" fill="#FFFFFF" opacity="0.16"/>
    <ellipse cx="820" cy="80"  rx="280" ry="40" fill="#FFE3CE" opacity="0.18"/>
    <ellipse cx="1080" cy="30" rx="180" ry="30" fill="#FFFFFF" opacity="0.14"/>
  </g>
  <rect width="1200" height="120" filter="url(#grainf)" opacity="0.10" style="mix-blend-mode:overlay"/>
</svg>
