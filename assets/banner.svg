<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ishika Chaurasia — Builder of Intelligent Products">
  <defs>
    <!-- Pink-sky sunset gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFD3E6"/>
      <stop offset="26%" stop-color="#FFAACD"/>
      <stop offset="52%" stop-color="#FF82A6"/>
      <stop offset="76%" stop-color="#FF885C"/>
      <stop offset="100%" stop-color="#FB6E2E"/>
    </linearGradient>

    <!-- Warm sun glow -->
    <radialGradient id="sun" cx="80%" cy="26%" r="46%">
      <stop offset="0%"  stop-color="#FFF6E2" stop-opacity="0.95"/>
      <stop offset="42%" stop-color="#FFDFB0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFDFB0" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle bottom vignette for text legibility -->
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7A1E2B" stop-opacity="0.18"/>
    </linearGradient>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <!-- Grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <filter id="textshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#7A1E2B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="300" fill="url(#sky)"/>

  <!-- Sun glow + disc -->
  <rect width="1200" height="300" fill="url(#sun)"/>
  <circle cx="960" cy="78" r="46" fill="#FFF7E8" opacity="0.85" filter="url(#soft)"/>
  <circle cx="960" cy="78" r="30" fill="#FFFBF0" opacity="0.9"/>

  <!-- Drifting clouds (layered, blurred for texture) -->
  <g filter="url(#soft)">
    <ellipse cx="220" cy="70"  rx="170" ry="38" fill="#FFFFFF" opacity="0.20"/>
    <ellipse cx="430" cy="120" rx="220" ry="42" fill="#FFFFFF" opacity="0.14"/>
    <ellipse cx="780" cy="50"  rx="150" ry="34" fill="#FFFFFF" opacity="0.16"/>
    <ellipse cx="1050" cy="150" rx="200" ry="46" fill="#FFE3CE" opacity="0.20"/>
    <ellipse cx="150" cy="230" rx="240" ry="50" fill="#FF6F8F" opacity="0.18"/>
    <ellipse cx="700" cy="250" rx="320" ry="58" fill="#FF7A45" opacity="0.16"/>
  </g>

  <!-- Grain overlay -->
  <rect width="1200" height="300" filter="url(#grain)" opacity="0.10" style="mix-blend-mode:overlay"/>

  <!-- Vignette -->
  <rect width="1200" height="300" fill="url(#vignette)"/>

  <!-- Text -->
  <g filter="url(#textshadow)" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="600" y="150" font-size="62" font-weight="800" letter-spacing="1.5" fill="#FFFFFF">Ishika Chaurasia</text>
    <text x="600" y="196" font-size="22" font-weight="600" letter-spacing="3" fill="#FFF4F0" opacity="0.95">BUILDER OF INTELLIGENT PRODUCTS</text>
    <text x="600" y="226" font-size="16" font-weight="500" letter-spacing="4" fill="#FFE9DF" opacity="0.9">AI / ML &#215; FULL-STACK</text>
  </g>
</svg>
