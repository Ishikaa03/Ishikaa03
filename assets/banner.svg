<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ishika Chaurasia — Builder of Intelligent Products">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0%"  stop-color="#FF6FA5"/>
      <stop offset="52%" stop-color="#FF895F"/>
      <stop offset="100%" stop-color="#FB7E2E"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#FF93BC"/>
      <stop offset="100%" stop-color="#FCA85C"/>
    </linearGradient>
    <filter id="ts" x="-20%" y="-40%" width="140%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#9A2740" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g>
    <!-- gentle floating motion -->
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -6; 0 0" dur="6s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- back wave (drifts sideways) -->
    <g opacity="0.45">
      <path fill="url(#g2)" d="M-80,0 L1280,0 L1280,150 C1140,186 1020,120 880,153 C740,186 640,121 500,153 C360,185 260,121 120,153 C60,168 0,150 -80,158 Z">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -70 0; 0 0" dur="8s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </path>
    </g>

    <!-- main wave block -->
    <path fill="url(#g)" d="M0,0 L1200,0 L1200,148 C1100,180 1000,120 900,150 C800,180 700,120 600,150 C500,180 400,120 300,150 C200,180 100,120 0,150 Z"/>

    <!-- text -->
    <g text-anchor="middle" filter="url(#ts)" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" fill="#FFFFFF">
      <text x="600" y="90" font-size="56" font-weight="800" letter-spacing="1.5">Ishika Chaurasia</text>
      <text x="600" y="122" font-size="17" font-weight="600" letter-spacing="2.5" opacity="0.96">BUILDER OF INTELLIGENT PRODUCTS &#183; AI / ML &#215; FULL-STACK</text>
    </g>
  </g>
</svg>
